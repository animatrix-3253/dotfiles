include-file = ~/.cache/wal/colors-polybar

[bar/main]
width = 100%
height = 24
radius = 0

bottom = true

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2
padding-left = 1
padding-right = 1

module-margin = 1

font-0 = "Fira Code Font Mono:size=10"

modules-left = i3
modules-center = date
modules-right = pulseaudio memory cpu

ttray-position = right

enable-ipc = true

[module/i3]
type = internal/i3

[module/date]
type = internal/date
interval = 1

date = %m-%d-%Y %
time = %H:%M

label = %date% %time%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = CPU

[module/memory]
type = internal/memory
interval = 2
format-prefix = RAM

[module/pulseaudio]
type = internal/pulseaudio
format-volume = VOL <label-volume>

label-volume = %percentage%
